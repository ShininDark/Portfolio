<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Aashraya</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div id="preloader">
      <div class="preloader-sprite">A</div>
      <div class="eq-bars">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="preloader-bar"></div>
    </div>
    <header>
      <div class="container nav-wrap">
        <a href="../index.html" class="logo" aria-label="Home">
          <svg viewBox="0 0 8 8" class="logo-icon" shape-rendering="crispEdges">
            <rect x="2" y="1" width="4" height="1" fill="currentColor" />
            <rect x="1" y="2" width="6" height="1" fill="currentColor" />
            <rect x="0" y="3" width="8" height="1" fill="currentColor" />
            <rect x="0" y="4" width="8" height="1" fill="currentColor" />
            <rect x="1" y="5" width="2" height="1" fill="currentColor" />
            <rect x="5" y="5" width="2" height="1" fill="currentColor" />
            <rect x="1" y="6" width="1" height="1" fill="currentColor" />
            <rect x="6" y="6" width="1" height="1" fill="currentColor" />
          </svg>
        </a>
        <div class="nav-right">
          <nav>
            <a href="../index.html">Home</a>
            <a href="work.html">Work</a>
            <a href="contact.html" class="active">Contact</a>
          </nav>
          <a href="../assets/aashraya-resume.pdf" download class="btn btn-sm"
            >Resume</a
          >
          <button class="nav-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="contact-hero container">
        <h1>Say hi!</h1>
        <p>
          Let's start a project together 🤝 Whether it's a job, a collab, or
          just talking shop about game dev — reach me directly.
        </p>

        <div class="contact-links">
          <a class="contact-link" href="mailto:belbaseaashraya@gmail.com">
            <span>Email</span>
            <span>belbaseaashraya@gmail.com</span>
          </a>
          <a
            class="contact-link"
            href="https://github.com/ShininDark"
            target="_blank"
            rel="noopener"
          >
            <span>GitHub</span>
            <span>ShininDark</span>
          </a>
          <div class="contact-link">
            <span>Copy email</span>
            <button class="copy-btn" onclick="copyEmail(this)">Copy</button>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; Aashraya. All rights reserved.</p>
    </footer>

    <script src="../js/main.js"></script>
    <script>
      function copyEmail(btn) {
        navigator.clipboard.writeText("belbaseaashraya@gmail.com");
        const original = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = original), 1500);
      }
    </script>
  </body>
</html>
